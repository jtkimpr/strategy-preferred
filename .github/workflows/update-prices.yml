name: Update Price Data

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 00:00 KST (월~금)
    - cron: '0 3 * * 2-6'    # 12:00 KST (월~금)
  workflow_dispatch:           # 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price update script
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Auto update price data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
